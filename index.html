<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weatherbit • Live Weather</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>🌤️ Weatherbit</h1>
      <p class="subtitle">Real-time weather data</p>
    </header>

    <div class="search-container">
      <input type="text" id="city" placeholder="Search city... (e.g. London, Tokyo)" value="New York">
      <button onclick="getWeather()">Search</button>
    </div>

    <div id="weather" class="weather-card"></div>
    <div id="forecast" class="forecast-container"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
